# Sigflo — Netlify production deploy
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  command = "npm run build"
  publish = "dist"
  functions = "netlify/functions"

[build.environment]
  NODE_VERSION = "22"

# Bundle serverless functions (ESM imports from netlify/functions/lib/*).
[functions]
  node_bundler = "esbuild"

# API routes → functions (must appear before the SPA catch‑all).
[[redirects]]
  from = "/api/ai/suggest"
  to = "/.netlify/functions/ai-suggest"
  status = 200
  force = true

[[redirects]]
  from = "/api/ai/news-scan"
  to = "/.netlify/functions/market-news-scan"
  status = 200
  force = true

# React Router — direct hits to /feed, /trade, etc.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

[dev]
  command = "npm run dev:vite"
  targetPort = 5173
  port = 3999
  publish = "dist"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
